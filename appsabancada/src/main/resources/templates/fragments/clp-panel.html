<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="clpPanel" id="clp" class="panel panel--compact">
    <div class="panel__header">
        <div>
            <p class="eyebrow">Conexão</p>
            <h2>Comunicação com a bancada</h2>
        </div>

        <div class="connection-badge" id="clpBadge">
            <span class="connection-badge__dot"></span>
            <span id="clpBadgeText">Desconectado</span>
        </div>
    </div>

    <div class="clp-grid">
        <label class="field">
            <span>Base IP</span>
            <input id="ipBase" type="text" placeholder="Ex.: 10.74.241" autocomplete="off">
        </label>

        <label class="field">
            <span>CLP Estoque</span>
            <input id="ipEstoque" type="text" placeholder="10.74.241.10" autocomplete="off">
        </label>

        <label class="field">
            <span>CLP Processo</span>
            <input id="ipProcesso" type="text" placeholder="10.74.241.11" autocomplete="off">
        </label>

        <label class="field">
            <span>CLP Montagem</span>
            <input id="ipMontagem" type="text" placeholder="10.74.241.12" autocomplete="off">
        </label>

        <label class="field">
            <span>CLP Expedição</span>
            <input id="ipExpedicao" type="text" placeholder="10.74.241.13" autocomplete="off">
        </label>
    </div>

    <div class="button-row">
        <button id="btnConectarClp" type="button" class="btn btn--primary">Conectar leituras</button>
        <button id="btnDesconectarClp" type="button" class="btn btn--ghost">Parar leituras</button>
        <button id="btnAtualizarTudo" type="button" class="btn btn--soft">Atualizar tela</button>
    </div>

    <details class="debug-box">
        <summary>Leituras brutas do CLP</summary>
        <div class="debug-grid">
            <pre id="rawEstoque">Estoque: aguardando leitura...</pre>
            <pre id="rawProcesso">Processo: aguardando leitura...</pre>
            <pre id="rawMontagem">Montagem: aguardando leitura...</pre>
            <pre id="rawExpedicao">Expedição: aguardando leitura...</pre>
        </div>
    </details>
</section>
</body>
</html>
