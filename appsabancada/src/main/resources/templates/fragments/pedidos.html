<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="pedidos" id="pedidos" class="panel">
    <div class="panel__header">
        <div>
            <p class="eyebrow">Ordens de produção</p>
            <h2>Pedidos cadastrados</h2>
        </div>

        <div class="filter-row" role="group" aria-label="Filtro de status">
            <button type="button" class="chip chip--active" data-status="0">Todos</button>
            <button type="button" class="chip" data-status="1">Pendente</button>
            <button type="button" class="chip" data-status="2">Produção</button>
            <button type="button" class="chip" data-status="3">Concluído</button>
        </div>
    </div>

    <div id="pedidosGrid" class="orders-grid">
        <div class="empty-state">Carregando pedidos...</div>
    </div>
</section>
</body>
</html>
