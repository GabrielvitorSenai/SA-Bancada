<header class="topbar" th:fragment="topbar(title, subtitle)">
    <button class="mobile-menu" data-mobile-menu type="button">☰</button>
    <div>
        <p class="eyebrow">Smart 4.0</p>
        <h1 th:text="${title}">Tela</h1>
        <p class="page-subtitle" th:text="${subtitle}">Descrição</p>
    </div>

    <div id="connectionPill" class="connection-pill">
        <span class="dot"></span>
        <div>
            <strong>Bancada desconectada</strong>
            <small>Aguardando conexão</small>
        </div>
    </div>
</header>
