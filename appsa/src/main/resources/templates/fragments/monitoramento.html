<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<section th:fragment="monitoramento" id="monitoramento" class="panel">
    <div class="panel__header">
        <div>
            <p class="eyebrow">Dashboard</p>
            <h2>Monitoramento da produção</h2>
        </div>
        <span class="pill">GET /api/estoque/posicoes</span>
    </div>

    <div class="station-grid" aria-label="Status das estações">
        <article class="station-card" id="stationEstoque">
            <span>Estoque</span>
            <strong>Aguardando</strong>
        </article>
        <article class="station-card" id="stationProcesso">
            <span>Processo</span>
            <strong>Aguardando</strong>
        </article>
        <article class="station-card" id="stationMontagem">
            <span>Montagem</span>
            <strong>Aguardando</strong>
        </article>
        <article class="station-card" id="stationExpedicao">
            <span>Expedição</span>
            <strong>Aguardando</strong>
        </article>
    </div>

    <div class="panel__subheader">
        <h3>Mapa do estoque</h3>
        <small>28 posições físicas. Clique em uma posição para gerenciar.</small>
    </div>

    <div id="estoqueGrid" class="stock-grid" aria-label="Mapa visual do estoque"></div>

    <div class="legend">
        <span><i class="legend-color color-0"></i> Livre</span>
        <span><i class="legend-color color-1"></i> Preto</span>
        <span><i class="legend-color color-2"></i> Vermelho</span>
        <span><i class="legend-color color-3"></i> Azul</span>
    </div>
</section>
</body>
</html>
