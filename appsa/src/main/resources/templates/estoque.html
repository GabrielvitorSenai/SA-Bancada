<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Gerenciamento de Estoque')}"></head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

    <main class="page-shell">
        <header th:replace="~{fragments/topbar :: topbar('Gerenciamento de Estoque da Bancada', 'Controle visual das 28 posições físicas do magazine.')}"></header>

        <section class="page-content">
            <div class="metrics-grid">
                <article class="metric-card success"><span>Posições ocupadas</span><strong id="metricEstoqueOcupado">0</strong></article>
                <article class="metric-card"><span>Posições livres</span><strong id="metricEstoqueLivre">28</strong></article>
                <article class="metric-card"><span>Total de posições</span><strong>28</strong></article>
                <article class="metric-card"><span>Atualizado</span><strong id="metricEstoqueAtualizado">-</strong></article>
            </div>

            <div class="two-column inventory-layout">
                <article class="panel">
                    <div class="panel-header">
                        <div>
                            <p class="eyebrow">Mapa físico</p>
                            <h2>Estoque</h2>
                        </div>
                        <button id="btnReloadEstoque" class="btn btn-secondary" type="button">Atualizar</button>
                    </div>

                    <div id="estoqueGrid" class="estoque-grid large"></div>

                    <div class="legend">
                        <span><i class="swatch cor-0"></i>Livre</span>
                        <span><i class="swatch cor-1"></i>Preto</span>
                        <span><i class="swatch cor-2"></i>Vermelho</span>
                        <span><i class="swatch cor-3"></i>Azul</span>
                    </div>
                </article>

                <aside class="panel form-panel">
                    <div class="panel-header vertical">
                        <p class="eyebrow">Operação</p>
                        <h2>Adicionar ou liberar</h2>
                        <p class="muted">O backend limpa a posição sem deletar fisicamente o registro, para preservar histórico de pedidos.</p>
                    </div>

                    <div class="form-stack">
                        <label class="field"><span>Posição</span><select id="estoquePosicao"></select></label>
                        <label class="field"><span>Cor</span><select id="estoqueCor"><option value="1">Preto</option><option value="2">Vermelho</option><option value="3">Azul</option></select></label>
                        <label class="field"><span>Quantidade</span><input id="estoqueQuantidade" type="number" min="1" value="1"></label>

                        <div class="actions vertical-actions">
                            <button id="btnAdicionarEstoque" class="btn btn-primary" type="button">Adicionar posição</button>
                            <button id="btnRemoverEstoque" class="btn btn-warning" type="button">Liberar posição</button>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>
</div>

<div th:replace="~{fragments/toast :: toast}"></div>
<script th:src="@{/js/core/api.js}"></script>
<script th:src="@{/js/core/ui.js}"></script>
<script th:src="@{/js/pages/estoque.js}"></script>
</body>
</html>
